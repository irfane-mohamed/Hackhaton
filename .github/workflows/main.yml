name: Godot Export

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html || true

      - name: Inject SharedArrayBuffer fix
        run: |
          cat > build/web/coi-serviceworker.js << 'EOF'
          self.addEventListener("install", () => self.skipWaiting());
          self.addEventListener("activate", e => e.waitUntil(self.clients.claim()));
          self.addEventListener("fetch", e => {
            if (e.request.cache === "only-if-cached" && e.request.mode !== "same-origin") return;
            e.respondWith(
              fetch(e.request).then(r => {
                const h = new Headers(r.headers);
                h.set("Cross-Origin-Opener-Policy", "same-origin");
                h.set("Cross-Origin-Embedder-Policy", "require-corp");
                return new Response(r.body, { status: r.status, statusText: r.statusText, headers: h });
              })
            );
          });
          EOF
          sed -i 's|<head>|<head><script>if(!crossOriginIsolated){navigator.serviceWorker.register("coi-serviceworker.js").then(()=>location.reload())}</script>|' build/web/index.html || true
          touch build/web/.nojekyll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptaObscura-web
          path: build/web/

  deploy-pages:
    needs: export-web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CryptaObscura-web
          path: web/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
